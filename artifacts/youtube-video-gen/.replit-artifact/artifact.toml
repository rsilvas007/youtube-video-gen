kind = "web"
previewPath = "/"
title = "YouTube Video Generator"
version = "1.0.0"
id = "artifacts/youtube-video-gen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25215

[services.development]
run = "pnpm --filter @workspace/youtube-video-gen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youtube-video-gen", "run", "build" ]
publicDir = "artifacts/youtube-video-gen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25215"
BASE_PATH = "/"
